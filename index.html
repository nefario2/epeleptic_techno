<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Mini Paint Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<div class="paint-container">
    <h2>Mini Paint</h2>

    <div class="controls">
        <button id="clear-btn">Clear canvas</button>
        <button id="random-btn">Random color mode: OFF</button>
        <input type="color" id="color-picker" value="#000000">
    </div>

    <div id="canvas"></div>

    <footer class="author-credits">
        <p>Author: Andriy Sushytskyi</p>
    </footer>
    <script src="script.js" defer></script>
</div>
</body>
</html>
